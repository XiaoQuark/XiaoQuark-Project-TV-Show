<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>TV Show Project | Kris Oldrini (XiaoQuark)</title>
		<link href="style.css" rel="stylesheet" />
		<link rel="icon" href="/favicon.ico" type="image/x-icon" />
	</head>

	<body>
		<div id="root">
			<header class="app-header">
				<label for="show-select">Choose a show</label>
				<select id="show-select">
					<option value="">Select a show...</option>
				</select>
			</header>
			<!-- main container for accessibility -->
			<main id="main">
				<button type="button" id="back-to-shows" hidden>
					Back to shows
				</button>
				<!-- use form for both accessibility and grouping select and search input, as well as episode count -->
				<section class="controls-container">
					<form id="controls">
						<label for="episode-select">Jump to Episode</label>
						<select id="episode-select">
							<option value="all">Select Episode</option>
						</select>
						<label for="search-input">Search episodes</label>
						<div class="search-wrapper">
							<input
								type="search"
								id="search-input"
								placeholder="Search episodes..."
							/>
							<button type="submit">Search</button>
							<button
								type="button"
								id="clear-search"
								aria-label="Clear search input"
							>
								Reset
							</button>
						</div>
					</form>
					<p id="episode-count" aria-live="polite"></p>
				</section>
				<section id="episodes-grid"></section>
				<template id="episode-template">
					<article id="episode-card">
						<img src="" alt="" />
						<h2>Episode Name</h2>
						<p episode-code class="code">Episode code</p>
						<p season-number class="season">Season number</p>
						<p episode-number class="episode-number">
							Episode Number
						</p>
						<div summary id="summary">Summary</div>
					</article>
				</template>
				<template id="show-template">
					<article class="show-card">
						<img src="" alt="" />
						<h2>Show Name</h2>
						<div class="show-summary">Summary</div>
						<p class="show-genres">Genres</p>
						<p class="show-status">Status</p>
						<p class="show-rating">Rating</p>
						<p class="show-runtime">Runtime</p>
					</article>
				</template>
			</main>
		</div>
		<footer>
			<p>
				Data originally provided by
				<a href="https://www.tvmaze.com/" target="_blank">TVMaze.com</a>
			</p>
		</footer>

		<!-- Loads YOUR javascript code -->
		<script src="script.js"></script>
	</body>
</html>
